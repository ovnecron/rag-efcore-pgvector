services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag_efcore_pgvector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rag-efcore-pgvector-data:/var/lib/postgresql/data

volumes:
  rag-efcore-pgvector-data:
